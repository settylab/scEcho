name: test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install package + dev extras (wheels only)
        run: uv pip install --system --only-binary=:all: -e ".[dev]"

      - name: Run pytest
        run: pytest -v -m "not slow" tests/

      - name: Run ruff (warn-only)
        run: ruff check --exit-zero src/ tests/
